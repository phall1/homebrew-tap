name: Update Token Tach

on:
  repository_dispatch:
    types: [token-tach-release]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Resolve release
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          DISPATCH_SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          set -euo pipefail
          if [[ -n "$DISPATCH_VERSION" && -n "$DISPATCH_SHA256" ]]; then
            version="$DISPATCH_VERSION"
            sha256="$DISPATCH_SHA256"
          else
            tag="$(curl --fail --silent --show-error --location \
              https://api.github.com/repos/phall1/token-tach/releases/latest | jq -r .tag_name)"
            version="${tag#v}"
            asset="https://github.com/phall1/token-tach/releases/download/$tag/token-tach-$version-universal2.dmg"
            if ! curl --fail --silent --show-error --location "$asset" --output "$RUNNER_TEMP/token-tach.dmg"; then
              echo "Latest release $tag predates the notarized Universal 2 pipeline; nothing to update."
              echo "SKIP_UPDATE=1" >> "$GITHUB_ENV"
              exit 0
            fi
            sha256="$(sha256sum "$RUNNER_TEMP/token-tach.dmg" | cut -d ' ' -f 1)"
          fi
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$sha256" =~ ^[0-9a-f]{64}$ ]]
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "SHA256=$sha256" >> "$GITHUB_ENV"

      - name: Render cask
        if: env.SKIP_UPDATE != '1'
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$SHA256" =~ ^[0-9a-f]{64}$ ]]
          mkdir -p Casks
          cat > Casks/token-tach.rb <<RUBY
          cask "token-tach" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/phall1/token-tach/releases/download/v#{version}/token-tach-#{version}-universal2.dmg",
                verified: "github.com/phall1/token-tach/"
            name "Token Tach"
            desc "Menu-bar tachometer for AI coding-agent token usage and subscription limits"
            homepage "https://github.com/phall1/token-tach"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :big_sur"

            app "Token Tach.app"
            binary "#{appdir}/Token Tach.app/Contents/MacOS/token-tach", target: "token-tach"

            zap trash: [
              "~/.config/token-tach",
              "~/.local/state/token-tach",
            ]

            caveats <<~EOS
              Token Tach is a menu-bar accessory app with no Dock icon.
              Launch it from Applications, then use its menu-bar item.
            EOS
          end
          RUBY

      - uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        if: env.SKIP_UPDATE != '1'
        with:
          commit_message: "Brew cask update for Token Tach"
          file_pattern: Casks/token-tach.rb
